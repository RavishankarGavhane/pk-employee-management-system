<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>PK Employees | Manage Staff</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: #f1f5f9; }

        /* Sidebar - Same as Departments page */
        .sidebar {
            background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            width: 280px;
            flex-shrink: 0;
        }
        .brand {
            padding: 1.8rem 1.5rem;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .brand-logo {
            width: 48px; height: 48px;
            background: linear-gradient(135deg, #4f46e5, #818cf8);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            box-shadow: 0 8px 20px rgba(79,70,229,0.3);
        }
        .nav-link {
            color: #cbd5e1;
            padding: 0.7rem 1.2rem;
            margin: 0.3rem 1rem;
            border-radius: 12px;
            transition: 0.2s;
            font-weight: 500;
        }
        .nav-link i { width: 24px; margin-right: 10px; }
        .nav-link:hover, .nav-link.active {
            background: rgba(255,255,255,0.1);
            color: white;
            transform: translateX(4px);
        }

        /* Main Layout Fix - Full height flex */
        .main-wrapper {
            display: flex;
            min-height: 100vh;
        }
        .main-content {
            flex-grow: 1;
            padding: 2rem;
            overflow-y: auto;
        }

        /* KPI Cards */
        .kpi-card {
            background: white;
            border-radius: 24px;
            padding: 1.25rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.02);
            transition: all 0.25s;
            border: 1px solid #e2e8f0;
            height: 100%;
        }
        .kpi-card:hover { transform: translateY(-4px); box-shadow: 0 20px 30px -12px rgba(0,0,0,0.1); }
        .kpi-icon {
            width: 48px; height: 48px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            margin-bottom: 1rem;
        }
        .kpi-value { font-size: 1.9rem; font-weight: 800; margin: 0.3rem 0 0; }

        /* Data Card & Table */
        .data-card {
            background: white;
            border-radius: 24px;
            border: 1px solid #eef2ff;
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.08);
            overflow: hidden;
        }
        .search-bar, .filter-select {
            border-radius: 50px;
            padding: 0.85rem 1.3rem;
            border: 1px solid #e2e8f0;
        }
        .search-bar:focus, .filter-select:focus {
            border-color: #4f46e5;
            box-shadow: 0 0 0 4px rgba(79,70,229,0.1);
        }

        .employee-table th {
            background: #f8fafc;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.6px;
            padding: 1.1rem 1rem;
            color: #475569;
        }
        .employee-table td {
            padding: 1.1rem 1rem;
            vertical-align: middle;
        }
        .employee-table tbody tr:hover {
            background: #f8fafc !important;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px -6px rgba(79,70,229,0.2);
        }
        .avatar {
            width: 42px; height: 42px;
            border-radius: 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 1rem;
            margin-right: 12px;
        }
        .status-badge {
            padding: 6px 18px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .action-btn {
            width: 38px; height: 38px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            margin: 0 3px;
        }

        .footer {
            text-align: center;
            padding: 1.5rem;
            color: #64748b;
            font-size: 0.8rem;
            border-top: 1px solid #e2e8f0;
            margin-top: 2rem;
        }

        /* Responsive */
        @media (max-width: 767px) {
            .sidebar { width: 100%; }
            .main-wrapper { flex-direction: column; }
            .main-content { padding: 1rem; }
        }
        @media (min-width: 1400px) {
            .main-content { padding: 2.5rem 3rem; }
        }
    </style>
</head>
<body>
<div class="main-wrapper">
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="brand d-flex align-items-center gap-3 text-white">
            <div class="brand-logo"><i class="fas fa-database"></i></div>
            <div><h4 class="mb-0">PK Employee</h4><small>Database System</small></div>
        </div>
        <nav class="nav flex-column mt-3">
            <a class="nav-link" href="/"><i class="fas fa-chart-line"></i> Dashboard</a>
            <a class="nav-link active" href="/employees-page"><i class="fas fa-users"></i> Employees</a>
            <a class="nav-link" href="/add-employee"><i class="fas fa-user-plus"></i> Add Employee</a>
            <a class="nav-link" href="/departments"><i class="fas fa-building"></i> Departments</a>
            <a class="nav-link" href="/attendance"><i class="fas fa-calendar-check"></i> Attendance</a>
            <a class="nav-link" href="/leaves"><i class="fas fa-umbrella-beach"></i> Leaves</a>
            <a class="nav-link" href="/department-report"><i class="fas fa-chart-simple"></i> Reports</a>
        </nav>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="fw-bold mb-1"><i class="fas fa-users text-primary me-2"></i>Employee Directory</h2>
                <p class="text-muted mb-0">Manage and view all employees</p>
            </div>
            <a href="/add-employee" class="btn btn-primary rounded-pill px-4 py-2">
                <i class="fas fa-plus me-2"></i>Add New
            </a>
        </div>

        <!-- KPI Cards -->
        <div class="row g-4 mb-5" id="kpiRow"></div>

        <!-- Table Card -->
        <div class="data-card">
            <div class="p-4 border-bottom d-flex flex-wrap gap-3">
                <input type="text" id="searchInput" class="form-control search-bar flex-grow-1" 
                       placeholder="🔍 Search by name, email, position...">
                <select id="deptFilter" class="form-select filter-select w-auto" style="min-width: 220px;">
                    <option value="">All Departments</option>
                </select>
            </div>

            <div class="table-responsive">
                <table class="table employee-table mb-0">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>FULL NAME</th>
                            <th>EMAIL</th>
                            <th>POSITION</th>
                            <th>DEPARTMENT</th>
                            <th>SALARY</th>
                            <th>STATUS</th>
                            <th style="width: 140px;">ACTIONS</th>
                        </tr>
                    </thead>
                    <tbody id="empTableBody"></tbody>
                </table>
            </div>
        </div>

        <div class="footer">© 2026 PK Employee Database System — Secure HRMS Solution</div>
    </div>
</div>

<script>
    // (Same script as before - no changes needed)
    let allEmployees = [];
    let departmentsMap = {};

    async function loadDepartments() {
        const res = await fetch('/api/departments');
        const depts = await res.json();
        depts.forEach(d => departmentsMap[d.id] = d.name);
        const select = document.getElementById('deptFilter');
        select.innerHTML = '<option value="">All Departments</option>' + 
            depts.map(d => `<option value="${d.id}">${d.name}</option>`).join('');
    }

    async function loadEmployees() {
        const tbody = document.getElementById('empTableBody');
        tbody.innerHTML = `<tr><td colspan="8" class="text-center py-5"><div class="spinner-border text-primary"></div><br>Loading employees...</td></tr>`;

        try {
            const res = await fetch('/api/employees');
            allEmployees = await res.json();

            // KPI Cards
            const total = allEmployees.length;
            const active = allEmployees.filter(e => e.status === 'Active').length;
            const totalSalary = allEmployees.reduce((sum, e) => sum + (e.salary || 0), 0);
            const avgSalary = total ? Math.round(totalSalary / total) : 0;

            document.getElementById('kpiRow').innerHTML = `
                <div class="col-md-3 col-sm-6">
                    <div class="kpi-card">
                        <div class="kpi-icon" style="background:#eef2ff;color:#4f46e5;"><i class="fas fa-users"></i></div>
                        <div class="text-muted small fw-semibold">TOTAL EMPLOYEES</div>
                        <div class="kpi-value">${total}</div>
                    </div>
                </div>
                <div class="col-md-3 col-sm-6">
                    <div class="kpi-card">
                        <div class="kpi-icon" style="background:#e6f7ec;color:#10b981;"><i class="fas fa-user-check"></i></div>
                        <div class="text-muted small fw-semibold">ACTIVE EMPLOYEES</div>
                        <div class="kpi-value">${active}</div>
                    </div>
                </div>
                <div class="col-md-3 col-sm-6">
                    <div class="kpi-card">
                        <div class="kpi-icon" style="background:#fff3e3;color:#f59e0b;"><i class="fas fa-indian-rupee-sign"></i></div>
                        <div class="text-muted small fw-semibold">TOTAL SALARY</div>
                        <div class="kpi-value">₹${totalSalary.toLocaleString('en-IN')}</div>
                    </div>
                </div>
                <div class="col-md-3 col-sm-6">
                    <div class="kpi-card">
                        <div class="kpi-icon" style="background:#f3e8ff;color:#8b5cf6;"><i class="fas fa-chart-bar"></i></div>
                        <div class="text-muted small fw-semibold">AVG SALARY</div>
                        <div class="kpi-value">₹${avgSalary}</div>
                    </div>
                </div>
            `;

            renderTable(allEmployees);
        } catch (err) {
            tbody.innerHTML = `<tr><td colspan="8" class="text-center py-5 text-danger">Failed to load employees</td></tr>`;
        }
    }

    function renderTable(employees) {
        const tbody = document.getElementById('empTableBody');
        if (!employees.length) {
            tbody.innerHTML = `<tr><td colspan="8" class="text-center py-5 text-muted">No employees found</td></tr>`;
            return;
        }
        tbody.innerHTML = employees.map(emp => {
            const initials = emp.full_name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0,2);
            const color = `hsl(${Math.random()*360}, 75%, 55%)`;
            return `
                <tr>
                    <td><strong>${emp.id}</strong></td>
                    <td>
                        <div class="d-flex align-items-center">
                            <div class="avatar" style="background:${color}">${initials}</div>
                            ${emp.full_name}
                        </div>
                    </td>
                    <td>${emp.email}</td>
                    <td>${emp.position || '-'}</td>
                    <td><span class="badge bg-light text-dark">${emp.department_name || '—'}</span></td>
                    <td>₹${(emp.salary || 0).toLocaleString('en-IN')}</td>
                    <td><span class="status-badge ${emp.status === 'Active' ? 'bg-success text-white' : 'bg-secondary text-white'}">${emp.status || 'Active'}</span></td>
                    <td>
                        <a href="/employee-details?id=${emp.id}" class="action-btn btn-outline-info"><i class="fas fa-eye"></i></a>
                        <a href="/edit-employee?id=${emp.id}" class="action-btn btn-outline-warning"><i class="fas fa-edit"></i></a>
                        <button class="action-btn btn-outline-danger delete-btn" data-id="${emp.id}"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>`;
        }).join('');
    }

    function filterTable() {
        const term = document.getElementById('searchInput').value.toLowerCase();
        const deptId = document.getElementById('deptFilter').value;
        const filtered = allEmployees.filter(emp => {
            const matchSearch = emp.full_name.toLowerCase().includes(term) ||
                                emp.email.toLowerCase().includes(term) ||
                                (emp.position && emp.position.toLowerCase().includes(term));
            const matchDept = !deptId || emp.department_id == deptId;
            return matchSearch && matchDept;
        });
        renderTable(filtered);
    }

    document.getElementById('searchInput').addEventListener('input', filterTable);
    document.getElementById('deptFilter').addEventListener('change', filterTable);

    document.getElementById('empTableBody').addEventListener('click', e => {
        if (e.target.closest('.delete-btn')) {
            const id = e.target.closest('.delete-btn').dataset.id;
            if (confirm('Delete this employee permanently?')) {
                fetch(`/api/employees/${id}`, { method: 'DELETE' })
                    .then(() => loadEmployees());
            }
        }
    });

    loadDepartments().then(() => loadEmployees());
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
