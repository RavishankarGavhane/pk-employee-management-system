<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Employee | PK System</title>
    <!-- same head as add_employee.html -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>/* same as add_employee */</style>
</head>
<body>
<div class="container-fluid p-0">
    <div class="row g-0">
        <div class="col-auto sidebar" style="width: 280px;"><!-- same sidebar markup as add_employee, active link 'Employees' --></div>
        <div class="col main-content">
            <h2 class="fw-bold mb-4"><i class="fas fa-edit text-primary me-2"></i>Edit Employee</h2>
            <div class="form-card">
                <form id="editForm">
                    <input type="hidden" id="empId">
                    <div class="row g-4">
                        <div class="col-md-6"><label>Full Name</label><input id="full_name" class="form-control"></div>
                        <div class="col-md-6"><label>Email</label><input id="email" class="form-control"></div>
                        <div class="col-md-6"><label>Phone</label><input id="phone" class="form-control"></div>
                        <div class="col-md-6"><label>Position</label><input id="position" class="form-control"></div>
                        <div class="col-md-6"><label>Department</label><select id="department_id" class="form-select"></select></div>
                        <div class="col-md-6"><label>Salary</label><input id="salary" type="number" step="0.01" class="form-control"></div>
                        <div class="col-md-6"><label>Hire Date</label><input id="hire_date" type="date" class="form-control"></div>
                        <div class="col-md-6"><label>Status</label><select id="status" class="form-select"><option>Active</option><option>Inactive</option></select></div>
                    </div>
                    <div class="mt-4"><button type="submit" class="btn btn-primary-custom">Update Employee</button> <a href="/employees-page" class="btn btn-outline-secondary">Cancel</a></div>
                    <div id="msg" class="mt-3"></div>
                </form>
            </div>
        </div>
    </div>
</div>
<script>
    const params = new URLSearchParams(location.search);
    const empId = params.get('id');
    if(!empId) location.href = '/employees-page';
    async function loadDepartments() {
        const res = await fetch('/api/departments');
        const depts = await res.json();
        const select = document.getElementById('department_id');
        select.innerHTML = depts.map(d => `<option value="${d.id}">${d.name}</option>`).join('');
    }
    async function loadEmployee() {
        const res = await fetch(`/api/employees/${empId}`);
        const emp = await res.json();
        document.getElementById('empId').value = emp.id;
        document.getElementById('full_name').value = emp.full_name;
        document.getElementById('email').value = emp.email;
        document.getElementById('phone').value = emp.phone;
        document.getElementById('position').value = emp.position;
        document.getElementById('salary').value = emp.salary;
        document.getElementById('hire_date').value = emp.hire_date;
        document.getElementById('status').value = emp.status;
        setTimeout(() => { document.getElementById('department_id').value = emp.department_id; }, 300);
    }
    document.getElementById('editForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const data = {
            full_name: document.getElementById('full_name').value,
            email: document.getElementById('email').value,
            phone: document.getElementById('phone').value,
            position: document.getElementById('position').value,
            department_id: parseInt(document.getElementById('department_id').value),
            salary: parseFloat(document.getElementById('salary').value),
            hire_date: document.getElementById('hire_date').value,
            status: document.getElementById('status').value
        };
        const res = await fetch(`/api/employees/${empId}`, { method: 'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(data) });
        if(res.ok) { document.getElementById('msg').innerHTML = '<div class="alert alert-success">Updated! Redirecting...</div>'; setTimeout(()=>location.href='/employees-page',1500);}
        else { const err = await res.json(); document.getElementById('msg').innerHTML = `<div class="alert alert-danger">${err.detail}</div>`; }
    });
    loadDepartments();
    loadEmployee();
</script>
</body>
</html>
