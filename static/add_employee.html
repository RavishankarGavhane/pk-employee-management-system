<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Employee | PK System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: #f1f5f9; }
        .sidebar {
            background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            transition: all 0.3s;
        }
        .brand {
            padding: 1.8rem 1.5rem;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .brand-logo {
            width: 48px; height: 48px;
            background: linear-gradient(135deg, #4f46e5, #818cf8);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            box-shadow: 0 8px 20px rgba(79,70,229,0.3);
        }
        .brand h4 { font-weight: 700; letter-spacing: -0.3px; }
        .brand small { font-size: 0.7rem; opacity: 0.7; }
        .nav-link {
            color: #cbd5e1;
            padding: 0.7rem 1.2rem;
            margin: 0.3rem 1rem;
            border-radius: 12px;
            transition: 0.2s;
            font-weight: 500;
        }
        .nav-link i { width: 24px; margin-right: 10px; }
        .nav-link:hover, .nav-link.active {
            background: rgba(255,255,255,0.1);
            color: white;
            transform: translateX(4px);
        }
        .main-content { padding: 2rem; }
        .form-card {
            background: white;
            border-radius: 28px;
            border: 1px solid #eef2ff;
            padding: 2rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.02);
        }
        .btn-primary-custom {
            background: #4f46e5;
            border: none;
            padding: 0.6rem 1.5rem;
            border-radius: 40px;
            color: white;
            font-weight: 500;
        }
        .btn-primary-custom:hover { background: #4338ca; }
        .footer {
            text-align: center;
            padding: 1.5rem;
            color: #64748b;
            font-size: 0.8rem;
            border-top: 1px solid #e2e8f0;
            margin-top: 2rem;
        }
    </style>
</head>
<body>
<div class="container-fluid p-0">
    <div class="row g-0">
        <div class="col-auto sidebar" style="width: 280px;">
            <div class="brand d-flex align-items-center gap-3 text-white">
                <div class="brand-logo"><i class="fas fa-database"></i></div>
                <div><h4 class="mb-0">PK Employee</h4><small>Database System</small></div>
            </div>
            <nav class="nav flex-column mt-3">
                <a class="nav-link" href="/"><i class="fas fa-chart-line"></i> Dashboard</a>
                <a class="nav-link" href="/employees-page"><i class="fas fa-users"></i> Employees</a>
                <a class="nav-link active" href="/add-employee"><i class="fas fa-user-plus"></i> Add Employee</a>
                <a class="nav-link" href="/departments"><i class="fas fa-building"></i> Departments</a>
                <a class="nav-link" href="/attendance"><i class="fas fa-calendar-check"></i> Attendance</a>
                <a class="nav-link" href="/leaves"><i class="fas fa-umbrella-beach"></i> Leaves</a>
                <a class="nav-link" href="/department-report"><i class="fas fa-chart-simple"></i> Reports</a>
            </nav>
        </div>
        <div class="col main-content">
            <h2 class="fw-bold mb-4"><i class="fas fa-user-plus text-primary me-2"></i>Add New Employee</h2>
            <div class="form-card">
                <form id="addEmployeeForm">
                    <div class="row g-4">
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Full Name *</label>
                            <input type="text" id="full_name" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Email *</label>
                            <input type="email" id="email" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Phone</label>
                            <input type="text" id="phone" class="form-control">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Position *</label>
                            <input type="text" id="position" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Department *</label>
                            <select id="department_id" class="form-select" required></select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Salary (₹)</label>
                            <input type="number" step="0.01" id="salary" class="form-control">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Hire Date *</label>
                            <input type="date" id="hire_date" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Status</label>
                            <select id="status" class="form-select">
                                <option>Active</option>
                                <option>Inactive</option>
                            </select>
                        </div>
                    </div>
                    <div class="mt-4">
                        <button type="submit" class="btn btn-primary-custom">Create Employee</button>
                        <a href="/employees-page" class="btn btn-outline-secondary ms-2">Cancel</a>
                    </div>
                    <div id="msg" class="mt-3"></div>
                </form>
            </div>
            <div class="footer">© 2026 PK Employee Database System — Secure HRMS Solution</div>
        </div>
    </div>
</div>
<script>
    async function loadDepartments() {
        const res = await fetch('/api/departments');
        const depts = await res.json();
        const select = document.getElementById('department_id');
        select.innerHTML = depts.map(d => `<option value="${d.id}">${d.name}</option>`).join('');
    }
    document.getElementById('addEmployeeForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const data = {
            full_name: document.getElementById('full_name').value,
            email: document.getElementById('email').value,
            phone: document.getElementById('phone').value,
            position: document.getElementById('position').value,
            department_id: parseInt(document.getElementById('department_id').value),
            salary: parseFloat(document.getElementById('salary').value) || 0,
            hire_date: document.getElementById('hire_date').value,
            status: document.getElementById('status').value
        };
        const res = await fetch('/api/employees', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        if (res.ok) {
            document.getElementById('msg').innerHTML = '<div class="alert alert-success">Employee created! Redirecting...</div>';
            setTimeout(() => location.href = '/employees-page', 1500);
        } else {
            const err = await res.json();
            document.getElementById('msg').innerHTML = `<div class="alert alert-danger">${err.detail}</div>`;
        }
    });
    loadDepartments();
    // Set default hire date to today
    document.getElementById('hire_date').valueAsDate = new Date();
</script>
</body>
</html>
