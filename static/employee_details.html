<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Employee Profile | PK System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>/* same sidebar */</style>
</head>
<body>
<div class="container-fluid p-0">
    <div class="row g-0">
        <div class="col-auto sidebar" style="width: 280px;"><!-- same sidebar as before, active 'Employees' --></div>
        <div class="col main-content">
            <div class="d-flex align-items-center gap-3 mb-4">
                <a href="/employees-page" class="btn btn-outline-secondary rounded-pill"><i class="fas fa-arrow-left"></i> Back</a>
                <h2 class="fw-bold mb-0">Employee Profile</h2>
            </div>
            <div class="row" id="profileContainer">
                <div class="col-md-4 text-center">
                    <div class="card border-0 shadow-sm rounded-4 p-4"><i class="fas fa-user-circle fa-7x text-primary mb-3"></i><h4 id="empName"></h4><p id="empRole" class="text-muted"></p></div>
                </div>
                <div class="col-md-8">
                    <div class="card border-0 shadow-sm rounded-4 p-4">
                        <div class="row g-3" id="detailsGrid"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script>
    const id = new URLSearchParams(location.search).get('id');
    if(!id) location.href = '/employees-page';
    fetch(`/api/employees/${id}`).then(r=>r.json()).then(emp => {
        document.getElementById('empName').innerText = emp.full_name;
        document.getElementById('empRole').innerText = emp.position;
        document.getElementById('detailsGrid').innerHTML = `
            <div class="col-6"><i class="fas fa-envelope text-primary me-2"></i> <strong>Email</strong><br>${emp.email}</div>
            <div class="col-6"><i class="fas fa-phone text-primary me-2"></i> <strong>Phone</strong><br>${emp.phone || 'N/A'}</div>
            <div class="col-6"><i class="fas fa-building text-primary me-2"></i> <strong>Department</strong><br>${emp.department_name || '—'}</div>
            <div class="col-6"><i class="fas fa-indian-rupee-sign text-primary me-2"></i> <strong>Salary</strong><br>₹${(emp.salary || 0).toLocaleString('en-IN')}</div>
            <div class="col-6"><i class="fas fa-calendar-alt text-primary me-2"></i> <strong>Hire Date</strong><br>${emp.hire_date}</div>
            <div class="col-6"><i class="fas fa-circle text-primary me-2"></i> <strong>Status</strong><br><span class="badge bg-success">${emp.status}</span></div>
        `;
    });
</script>
</body>
</html>
